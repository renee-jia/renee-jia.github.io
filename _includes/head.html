<meta charset="utf-8">

{% include seo.html %}

{% unless site.atom_feed.hide %}
  <link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ '/feed.xml' | relative_url }}{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">
{% endunless %}

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
  {% if site.enable_copy_code_button -%}
    window.enable_copy_code_button = true;
  {%- endif %}
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<link rel="preload" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@latest/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@latest/css/all.min.css"></noscript>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- MathJax for math rendering -->
<script>
  MathJax = {
    tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
    svg: { fontCache: 'global' }
  };
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

<style>
  /* Force white background everywhere */
  html, body, .initial-content, #main, .page, .archive {
    background: #fff !important;
  }

  /* Navigation */
  .masthead {
    background: none !important;
    border: none !important;
    border-bottom: 2px solid #1a1a1a !important;
    box-shadow: none !important;
    padding: 2.2em 0;
  }

  .masthead::after,
  .masthead::before,
  .masthead__inner-wrap::before,
  .masthead__inner-wrap::after {
    display: none !important;
    content: none !important;
  }

  .masthead__inner-wrap {
    border: none !important;
    background: none !important;
    box-shadow: none !important;
    max-width: 1100px;
  }

  .masthead, .masthead__inner-wrap, .masthead__menu,
  .masthead__menu-item, .masthead__title, .masthead__title a {
    border: none !important;
    background: none !important;
  }

  .masthead__title {
    font-weight: 700;
    font-size: 2em;
    color: #1a1a1a !important;
    padding: 0 !important;
    margin: 0 !important;
  }

  .masthead__title a {
    color: #1a1a1a !important;
    text-decoration: none;
  }

  .masthead__menu-item {
    font-weight: 400;
    font-size: 1.2em;
    color: rgba(0,0,0,0.55) !important;
    transition: color 0.2s ease;
    padding: 0.3em 0.6em;
    margin: 0;
  }

  .masthead__menu-item:hover {
    color: #1a1a1a !important;
  }

  /* Footer - clean white */
  .page__footer {
    background: #fff !important;
    border-top: 1px solid rgba(0,0,0,0.06);
    color: rgba(0,0,0,0.4);
    padding: 1.5em 0;
    margin-top: 0;
  }

  .page__footer a { color: #004276; }
  .page__footer a:hover { color: #0068b7; }

  /* Hide auto-generated page titles for distill layout */
  .layout--distill .page__title,
  .layout--distill .page header {
    display: none !important;
  }
</style>

{% if site.head_scripts %}
  {% for script in site.head_scripts %}
    <script src="{{ script | relative_url }}"></script>
  {% endfor %}
{% endif %}
